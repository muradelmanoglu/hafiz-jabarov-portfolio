spring.application.name=portfolio-backend

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
server.tomcat.max-http-form-post-size=20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ─── Database (PostgreSQL) ────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/HafizJabarov}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:2005}
spring.datasource.hikari.connection-init-sql=SET statement_timeout = 0
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:X7fK2mP9qR4sT6uV8wY1zA3bC5dE7fG9hI0jK2lM4nO6pQ8rS0tU2vW4xY6zA8b}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ─── Admin ────────────────────────────────────────────────────────────────────
app.admin.default-username=${ADMIN_USERNAME:admin}
app.admin.default-password=${ADMIN_PASSWORD:changeme123!}

# ─── File Uploads ────────────────────────────────────────────────────────────
app.upload.dir=${UPLOAD_DIR:./uploads}

# ─── Rate Limiting ────────────────────────────────────────────────────────────
app.rate-limit.login.max-attempts=5
app.rate-limit.login.window-minutes=15
app.rate-limit.contact.max-attempts=5
app.rate-limit.contact.window-minutes=60

# ─── Email (Resend SMTP or any SMTP) ─────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:your-resend-api-key}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.resend.com}

app.email.notification-to=${NOTIFICATION_EMAIL:jabarovhafiz@gmail.com}
app.email.from=${FROM_EMAIL:noreply@hafizjabarov.com}

# ─── Async ────────────────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=8

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.hafiz.portfolio=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
